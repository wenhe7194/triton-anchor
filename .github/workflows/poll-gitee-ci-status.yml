name: Poll Gitee CI Status

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: poll-gitee-ci-status
  cancel-in-progress: false

jobs:
  sync-status:
    runs-on: ubuntu-latest

    steps:
      - name: Read Gitee result and update GitHub status
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          STATUS_URL: https://gitee.com/wen-he-chy/triton-anchor/raw/ci-results/latest/status.json
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          token = os.environ["GH_TOKEN"]
          repo = os.environ["REPO"]
          status_url = os.environ["STATUS_URL"]

          def request_json(url, method="GET", payload=None):
              data = None
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")

              req = urllib.request.Request(
                  url,
                  data=data,
                  method=method,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                      "User-Agent": "github-actions-gitee-ci-poller",
                  },
              )

              with urllib.request.urlopen(req, timeout=30) as resp:
                  body = resp.read().decode("utf-8", errors="replace")
                  return resp.status, json.loads(body) if body else None

          req = urllib.request.Request(
              status_url,
              headers={"User-Agent": "github-actions-gitee-ci-poller"},
          )

          with urllib.request.urlopen(req, timeout=30) as resp:
              raw = resp.read().decode("utf-8", errors="replace")

          try:
              status = json.loads(raw)
          except json.JSONDecodeError:
              print(raw[:500])
              raise

          sha = status["sha"]
          state = status["state"]
          description = status.get("description", "")[:140]
          context = status.get("context", "local-ci/add-benchmark")
          target_url = status.get(
              "target_url",
              f"https://gitee.com/wen-he-chy/triton-anchor/tree/ci-results/results/{sha}",
          )

          if state not in {"success", "failure", "error", "pending"}:
              raise SystemExit(f"invalid state: {state}")

          api_url = f"https://api.github.com/repos/{repo}/statuses/{sha}"

          try:
              _, existing = request_json(api_url)
          except urllib.error.HTTPError as exc:
              print(exc.read().decode("utf-8", errors="replace"), file=sys.stderr)
              raise

          for item in existing:
              if item.get("context") == context:
                  if (
                      item.get("state") == state
                      and item.get("target_url") == target_url
                      and item.get("description") == description
                  ):
                      print(f"status already up to date: {sha} {state}")
                      raise SystemExit(0)
                  break

          payload = {
              "state": state,
              "target_url": target_url,
              "description": description,
              "context": context,
          }

          code, response = request_json(api_url, method="POST", payload=payload)
          print(f"GitHub API status: {code}")
          print(f"GitHub status pushed: {sha} {state} {context}")
          PY
