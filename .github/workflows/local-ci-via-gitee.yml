name: Local CI via Gitee

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: local-ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  local-ci-add-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    env:
      CONTEXT: local-ci/add-benchmark

    steps:
      - name: Resolve PR metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            echo "pr=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "pr=manual" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.sha }}
          fetch-depth: 0

      - name: Push PR head to Gitee
        env:
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          PR_NUMBER: ${{ steps.meta.outputs.pr }}
        run: |
          if [ -z "$GITEE_USERNAME" ] || [ -z "$GITEE_TOKEN" ]; then
            echo "GITEE_USERNAME or GITEE_TOKEN is empty"
            exit 1
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git remote add gitee "https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/wen-he-chy/triton-anchor.git"
          git push --force gitee HEAD:refs/heads/ci/pr-${PR_NUMBER}

      - name: Wait for Gitee local CI result
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ steps.meta.outputs.sha }}
          REPO: ${{ github.repository }}
          CONTEXT: ${{ env.CONTEXT }}
          RESULT_URL: https://gitee.com/wen-he-chy/triton-anchor/raw/ci-results/results/${{ steps.meta.outputs.sha }}/status.json
        run: |
          python3 - <<'PY'
          import json, os, time, urllib.error, urllib.request

          token = os.environ["GH_TOKEN"]
          repo = os.environ["REPO"]
          sha = os.environ["SHA"]
          context = os.environ["CONTEXT"]
          result_url = os.environ["RESULT_URL"]

          def post_status(state, description, target_url=None):
              payload = {"state": state, "description": description[:140], "context": context}
              if target_url:
                  payload["target_url"] = target_url

              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/statuses/{sha}",
                  data=json.dumps(payload).encode("utf-8"),
                  method="POST",
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                  },
              )
              with urllib.request.urlopen(req, timeout=30) as resp:
                  print(f"GitHub status {state}: {resp.status}")

          post_status("pending", "local add benchmark queued on Gitee")

          deadline = time.time() + 120 * 60

          while time.time() < deadline:
              try:
                  req = urllib.request.Request(result_url, headers={"User-Agent": "github-actions-local-ci-via-gitee"})
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      status = json.loads(resp.read().decode("utf-8-sig", errors="replace"))

                  if status.get("sha") != sha:
                      print(f"ignore status for {status.get('sha')}, waiting for {sha}")
                      time.sleep(30)
                      continue

                  state = status["state"]
                  description = status.get("description", "local CI finished")
                  target_url = status.get(
                      "target_url",
                      f"https://gitee.com/wen-he-chy/triton-anchor/tree/ci-results/results/{sha}",
                  )

                  post_status(state, description, target_url)
                  print(f"local CI result: {sha} {state}")

                  raise SystemExit(0 if state == "success" else 1)

              except urllib.error.HTTPError as exc:
                  if exc.code == 404:
                      print(f"result not ready: {sha}")
                  else:
                      print(exc.read().decode("utf-8", errors="replace")[:500])
              except Exception as exc:
                  print(f"waiting error: {exc!r}")

              time.sleep(30)

          post_status("error", "local CI timed out waiting for Gitee result")
          raise SystemExit(1)
          PY
