name: Sync Gitee

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync-gitee:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push main to Gitee
        env:
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          if [ -z "$GITEE_USERNAME" ] || [ -z "$GITEE_TOKEN" ]; then
            echo "GITEE_USERNAME or GITEE_TOKEN is empty"
            exit 1
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git remote add gitee "https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/wen-he-chy/triton-anchor.git"
          git push gitee HEAD:main
