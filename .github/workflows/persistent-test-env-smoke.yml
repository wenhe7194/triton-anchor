name: Persistent Test Env Smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: [self-hosted, linux, x64, backend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Check persistent test container
        run: |
          docker inspect triton-test-env >/dev/null
          docker exec \
            -e GITHUB_WORKSPACE="$GITHUB_WORKSPACE" \
            triton-test-env \
            bash -lc 'cd "$GITHUB_WORKSPACE" && run-smoke'

