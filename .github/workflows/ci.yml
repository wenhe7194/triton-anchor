# ──────────────────────────────────────────────────────────────
# triton-anchor  Minimum CI
# ──────────────────────────────────────────────────────────────
name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

# 同一分支上新的推送自动取消旧的运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── 全局环境变量 ──────────────────────────────────────────────
env:
  PYTHON_VERSION: "3.10"

jobs:
  # ───────────────────────── Job 1: Lint ──────────────────────
  lint:
    name: "Lint & Style"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false          # 不拉取 triton submodule

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint tools
        run: pip install ruff

      - name: Ruff check (lint)
        run: ruff check python/ tests/ --output-format=github

      - name: Ruff format check
        run: ruff format --check python/ tests/

  # ───────────── Job 2: Pure-Python unit tests ────────────────
  unit-test:
    name: "Unit Tests (pure Python)"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run pure-Python unit tests
        run: |
          pytest python/triton_anchor/tests/ \
            -v \
            --tb=short \
            --cov=python/triton_anchor \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml
        env:
          PYTHONPATH: python

      - name: Upload coverage artifact
        if: matrix.python-version == '3.10'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ────────────── Job 3: Full build (C++ / CMake) ─────────────
